<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS WT2 Database 2019–2025</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg: #0e1117;
  --surface: #161b22;
  --surface2: #1c2333;
  --surface3: #242d3d;
  --border: #2d3748;
  --border2: #3d4f65;
  --text: #e2e8f0;
  --text2: #a0aec0;
  --text3: #718096;
  --accent: #60a5fa;
  --accent2: #3b82f6;
  --accent-dim: rgba(96,165,250,.12);
  --ad: #93c5fd; --ad-bg: rgba(147,197,253,.1);
  --dbv: #86efac; --dbv-bg: rgba(134,239,172,.1);
  --advdis: #fde68a; --advdis-bg: rgba(253,230,138,.1);
  --pn: #fdba74; --pn-bg: rgba(253,186,116,.1);
  --cs: #fca5a5; --cs-bg: rgba(252,165,165,.1);
  --tq: #c4b5fd; --tq-bg: rgba(196,181,253,.1);
  --ps: #f9a8d4; --ps-bg: rgba(249,168,212,.1);
  --ce: #fb923c; --ce-bg: rgba(251,146,60,.1);
  --radius: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a1f2e 0%, #0e1117 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px;
  position: sticky; top: 0; z-index: 100;
}
.header-inner { max-width: 1400px; margin: 0 auto; }
.header h1 {
  font-size: 20px; font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  letter-spacing: -.3px;
}
.header-sub { font-size: 12px; color: var(--text3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }

/* LAYOUT */
.container { max-width: 1400px; margin: 0 auto; padding: 16px 24px; }
.grid-layout { display: grid; grid-template-columns: 280px 1fr; gap: 16px; }
@media (max-width: 900px) { .grid-layout { grid-template-columns: 1fr; } }

/* SIDEBAR */
.sidebar {
  position: sticky; top: 80px; height: calc(100vh - 96px);
  overflow-y: auto; padding-right: 8px;
}
.sidebar::-webkit-scrollbar { width: 4px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

.filter-section { margin-bottom: 16px; }
.filter-label {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1.2px; color: var(--text3); margin-bottom: 6px;
}

/* SEARCH */
.search-box {
  position: relative; margin-bottom: 16px;
}
.search-box input {
  width: 100%; padding: 10px 12px 10px 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px;
  outline: none; transition: border-color .2s;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text3); }
.search-icon {
  position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
  color: var(--text3); font-size: 14px; pointer-events: none;
}

/* FILTER CHIPS */
.chip-group { display: flex; flex-wrap: wrap; gap: 4px; }
.chip {
  padding: 4px 10px; font-size: 11px; font-weight: 500;
  border-radius: 20px; cursor: pointer; user-select: none;
  border: 1px solid var(--border); background: var(--surface);
  color: var(--text2); transition: all .15s; white-space: nowrap;
}
.chip:hover { border-color: var(--accent); color: var(--text); }
.chip.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* TYPE CHIPS with colors */
.chip-ad.active { background: var(--ad-bg); border-color: var(--ad); color: var(--ad); }
.chip-dbv.active { background: var(--dbv-bg); border-color: var(--dbv); color: var(--dbv); }
.chip-advdis.active { background: var(--advdis-bg); border-color: var(--advdis); color: var(--advdis); }
.chip-pn.active { background: var(--pn-bg); border-color: var(--pn); color: var(--pn); }
.chip-cs.active, .chip-ce.active { background: var(--cs-bg); border-color: var(--cs); color: var(--cs); }
.chip-tq.active { background: var(--tq-bg); border-color: var(--tq); color: var(--tq); }
.chip-ps.active { background: var(--ps-bg); border-color: var(--ps); color: var(--ps); }

/* STATS BAR */
.stats-bar {
  display: flex; align-items: center; gap: 16px; padding: 10px 0;
  border-bottom: 1px solid var(--border); margin-bottom: 12px; flex-wrap: wrap;
}
.stat-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 22px; font-weight: 700; color: var(--accent);
}
.stat-label { font-size: 11px; color: var(--text3); }
.stat-block { display: flex; flex-direction: column; }

/* QUESTION CARDS */
.card-list { display: flex; flex-direction: column; gap: 6px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px;
  transition: all .15s; cursor: default;
  border-left: 3px solid transparent;
}
.card:hover { border-color: var(--border2); background: var(--surface2); }
.card-top {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 6px; flex-wrap: wrap;
}
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 4px; letter-spacing: .5px; white-space: nowrap;
}
.badge-ad { background: var(--ad-bg); color: var(--ad); }
.badge-dbv { background: var(--dbv-bg); color: var(--dbv); }
.badge-advdis { background: var(--advdis-bg); color: var(--advdis); }
.badge-pn { background: var(--pn-bg); color: var(--pn); }
.badge-cs, .badge-ce { background: var(--cs-bg); color: var(--cs); }
.badge-tq { background: var(--tq-bg); color: var(--tq); }
.badge-ps { background: var(--ps-bg); color: var(--ps); }

.card-date {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: var(--text3);
}
.card-topic { font-size: 11px; color: var(--text3); }
.card-q { font-size: 13px; line-height: 1.65; color: var(--text); }
.card-q mark {
  background: rgba(96,165,250,.25); color: var(--accent);
  border-radius: 2px; padding: 0 2px;
}
.card-note {
  font-size: 11px; color: var(--text3); margin-top: 6px;
  font-style: italic;
}
.card-id {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--text3); opacity: .5;
}

/* Card left border colors */
.card-border-ad { border-left-color: var(--ad); }
.card-border-dbv { border-left-color: var(--dbv); }
.card-border-advdis { border-left-color: var(--advdis); }
.card-border-pn { border-left-color: var(--pn); }
.card-border-cs, .card-border-ce { border-left-color: var(--cs); }
.card-border-tq { border-left-color: var(--tq); }
.card-border-ps { border-left-color: var(--ps); }

/* MINI CHART */
.mini-chart { margin-top: 12px; }
.bar-row {
  display: flex; align-items: center; gap: 6px;
  margin-bottom: 3px;
}
.bar-label { font-size: 10px; color: var(--text3); width: 32px; text-align: right; font-family: 'JetBrains Mono', monospace; }
.bar-track { flex: 1; height: 14px; background: var(--surface2); border-radius: 3px; overflow: hidden; position: relative; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .4s ease; }
.bar-count { font-size: 10px; color: var(--text3); width: 26px; font-family: 'JetBrains Mono', monospace; }

/* PAGINATION */
.pagination {
  display: flex; align-items: center; justify-content: center;
  gap: 6px; margin-top: 16px; padding: 12px 0;
}
.page-btn {
  padding: 6px 12px; font-size: 12px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); color: var(--text2);
  cursor: pointer; transition: all .15s; font-family: 'DM Sans', sans-serif;
}
.page-btn:hover { border-color: var(--accent); color: var(--text); }
.page-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }
.page-btn:disabled { opacity: .3; cursor: not-allowed; }
.page-info { font-size: 11px; color: var(--text3); font-family: 'JetBrains Mono', monospace; }

/* CLEAR BTN */
.clear-btn {
  font-size: 11px; color: var(--accent); cursor: pointer;
  background: none; border: none; font-family: 'DM Sans', sans-serif;
  padding: 4px 0; opacity: .8;
}
.clear-btn:hover { opacity: 1; text-decoration: underline; }

/* EMPTY STATE */
.empty {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: 14px;
}
.empty-icon { font-size: 40px; margin-bottom: 12px; opacity: .3; }

/* RESPONSIVE */
@media (max-width: 900px) {
  .sidebar { position: static; height: auto; }
  .container { padding: 12px; }
  .header { padding: 14px 12px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>IELTS Writing Task 2 — Kho Đề Thi 2019–2025</h1>
    <div class="header-sub">623 đề · 7 năm · 19 chủ đề · 8 dạng đề — Tra cứu & Đối chiếu nhanh</div>
  </div>
</div>

<div class="container">
  <div class="grid-layout">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="searchInput" placeholder="Tìm từ khóa trong đề bài..." autocomplete="off">
      </div>

      <div class="filter-section">
        <div class="filter-label">Năm thi</div>
        <div class="chip-group" id="yearChips"></div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Dạng đề</div>
        <div class="chip-group" id="typeChips"></div>
      </div>

      <div class="filter-section">
        <div class="filter-label">Chủ đề</div>
        <div class="chip-group" id="topicChips"></div>
      </div>

      <div style="margin-top:8px">
        <button class="clear-btn" onclick="clearAll()">✕ Xóa tất cả bộ lọc</button>
      </div>

      <!-- MINI CHART -->
      <div class="mini-chart" id="miniChart">
        <div class="filter-label" style="margin-top:16px; margin-bottom:8px">Phân bổ theo năm (đang lọc)</div>
        <div id="yearBars"></div>
      </div>
    </div>

    <!-- MAIN -->
    <div class="main">
      <div class="stats-bar">
        <div class="stat-block">
          <div class="stat-num" id="countDisplay">623</div>
          <div class="stat-label">kết quả</div>
        </div>
        <div class="stat-block" id="filterInfo" style="display:none">
          <div class="stat-label" id="filterText"></div>
        </div>
      </div>

      <div class="card-list" id="cardList"></div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<script>
const DATA = [{"id": 1, "y": 2019, "d": "05/01/2019", "t": "Agree / Disagree", "tp": "Environment & Animals", "q": "In the modern world, it is no longer necessary to use animals for food, clothing or medicine. To what extent do you agree or disagree?", "n": ""}, {"id": 2, "y": 2019, "d": "09/01/2019", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "Young people who commit crimes should be treated in the same way as adults. To what extent do you agree or disagree?", "n": ""}, {"id": 3, "y": 2019, "d": "12/01/2019", "t": "Agree / Disagree", "tp": "Environment", "q": "Environmental protection is the responsibility of politicians, not individuals as individuals can do too little. To what extent do you agree or disagree?", "n": "Giấy; lặp lại 24/08 & 06/10/2019"}, {"id": 4, "y": 2019, "d": "12/01/2019", "t": "Agree / Disagree", "tp": "Family & Children", "q": "In order for a child to develop his/her family life, mothers and fathers should take a course on parenting skills and child development each year. To what extent do you agree or disagree?", "n": "Máy tính"}, {"id": 5, "y": 2019, "d": "15/01/2019", "t": "Agree / Disagree", "tp": "Family & Children", "q": "New parents should attend parenting courses to ensure the growth of their children. To what extent do you agree or disagree?", "n": ""}, {"id": 6, "y": 2019, "d": "19/01/2019", "t": "Discuss Both Views", "tp": "Media & Advertising", "q": "Some people think that newspapers are the best way to learn news. However, others believe that they can learn news better through other media. Discuss both views and give your opinion.", "n": ""}, {"id": 7, "y": 2019, "d": "20/01/2019", "t": "Agree / Disagree", "tp": "Environment", "q": "Pollution and environment damage result from developing and making the country richer. To what extent do you agree or disagree?", "n": ""}, {"id": 8, "y": 2019, "d": "02/02/2019", "t": "Positive / Negative", "tp": "Society & Culture", "q": "More and more people buy famous brands of clothes, cars and items. Why do people do this? Do you think it is a positive or negative development?", "n": ""}, {"id": 9, "y": 2019, "d": "09/02/2019", "t": "Discuss Both Views", "tp": "Work & Employment", "q": "In most successful organizations, some people believe that communication between managers and workers is important, while other people say that other factors are more important. What is your opinion?", "n": ""}, {"id": 10, "y": 2019, "d": "14/02/2019", "t": "Agree / Disagree", "tp": "Technology", "q": "Some people claim that public museums and art galleries will not be needed because people can see historical objects and works of art by using a computer. To what extent do you agree or disagree?", "n": "IDP"}, {"id": 11, "y": 2019, "d": "14/02/2019", "t": "Advantages vs. Disadvantages", "tp": "Technology", "q": "New technologies have changed the way children spend their free time. Do you think the advantages outweigh the disadvantages?", "n": "BC"}, {"id": 12, "y": 2019, "d": "24/02/2019", "t": "Discuss Both Views", "tp": "Environment & Animals", "q": "Some people believe that all wild animals should be protected. Others say that only a few wild animals should be protected instead. Discuss both views and give your opinion.", "n": ""}, {"id": 13, "y": 2019, "d": "27/02/2019", "t": "Positive / Negative", "tp": "Society & Culture", "q": "In many countries, people buy more household goods (such as television, oven, rice cooker, etc.) than ever. Do you think this is a positive or negative development?", "n": ""}, {"id": 14, "y": 2019, "d": "02/03/2019", "t": "Causes & Solutions", "tp": "Work & Employment", "q": "The world of work is rapidly changing and employees cannot depend on having the same work or the same work conditions for life. Discuss the possible causes and suggest ways to prepare for people to work in the future.", "n": ""}, {"id": 15, "y": 2019, "d": "03/03/2019", "t": "Discuss Both Views", "tp": "Government & Policy", "q": "Some people think politicians have the greatest influence on the world, others think that scientists have the greatest influence. Discuss both views and give your opinion.", "n": ""}, {"id": 16, "y": 2019, "d": "07/03/2019", "t": "Agree / Disagree", "tp": "Technology", "q": "There are many inventions through human history, some people think the invention of the internet is the most important. To what extent do you agree or disagree?", "n": "Máy tính"}, {"id": 17, "y": 2019, "d": "07/03/2019", "t": "Agree / Disagree", "tp": "Globalization & Tourism", "q": "International tourism is the world's biggest industry. Unfortunately, this trend often causes tension rather than understanding between people from different cultures. To what extent do you agree or disagree?", "n": "Máy tính"}, {"id": 18, "y": 2019, "d": "07/03/2019", "t": "Causes & Solutions", "tp": "Crime & Law", "q": "Research suggests that the majority of criminals who are sent to prison would commit crimes when set free. What are the reasons? What can be done to solve the problem?", "n": "Máy tính"}, {"id": 19, "y": 2019, "d": "09/03/2019", "t": "Discuss Both Views", "tp": "Media & Advertising", "q": "Some people believe that the only purpose of films is to entertain. Others say films should have educational value. Discuss both views and give your opinion.", "n": "Giấy"}, {"id": 20, "y": 2019, "d": "09/03/2019", "t": "Advantages vs. Disadvantages", "tp": "Technology", "q": "In the past, knowledge was stored in books. Now, knowledge is stored on the internet. Do you think the advantages outweigh the disadvantages?", "n": "Máy tính"}, {"id": 21, "y": 2019, "d": "14/03/2019", "t": "Advantages vs. Disadvantages", "tp": "Housing & Urban", "q": "In some countries, small town-centre shops are going out of business because people tend to drive to large out-of-town stores. As a result, people without cars have limited access to out-of-town stores, and it may result in an increase in the use of cars. Do you think the disadvantages outweigh the advantages?", "n": "Lặp lại 10/10/2019"}, {"id": 22, "y": 2019, "d": "14/03/2019", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people think that the best way to reduce crime is to give longer prison sentences. Others, however, believe there are better alternative ways of reducing crime. Discuss both views and give your opinion.", "n": "Giấy"}, {"id": 23, "y": 2019, "d": "15/03/2019", "t": "Discuss Both Views", "tp": "Environment & Animals", "q": "Nowadays, many animal species are becoming extinct. Some people believe that countries and individuals must solve this problem, others believe that human beings are more important. Discuss both views and give your opinion.", "n": ""}, {"id": 24, "y": 2019, "d": "19/03/2019", "t": "Advantages vs. Disadvantages", "tp": "Science & Research", "q": "In today's world, besides governments, private companies pay for and conduct scientific research. Do you think the advantages outweigh the disadvantages?", "n": ""}, {"id": 25, "y": 2019, "d": "20/03/2019", "t": "Causes & Solutions", "tp": "Education", "q": "It is observed that in many countries not enough students are choosing to study science subjects. What are the causes? What can be done to encourage students to choose science subjects?", "n": ""}, {"id": 26, "y": 2019, "d": "21/03/2019", "t": "Positive / Negative", "tp": "Society & Culture", "q": "It is expected that there will be a higher proportion of older people than that of young people in many countries in the future. Do you think it is a positive or negative development?", "n": ""}, {"id": 27, "y": 2019, "d": "22/03/2019", "t": "Causes & Effects", "tp": "Society & Culture", "q": "People are living in a 'throwaway society', using things for a short time and then throwing them away. What are the causes of this? What problems does it lead to?", "n": ""}, {"id": 28, "y": 2019, "d": "28/03/2019", "t": "Discuss Both Views", "tp": "Media & Advertising", "q": "In some countries, advertisers increase the amount of advertising which tries to persuade children to buy snacks, toys and other goods. Parents object to such pressure on children. But some advertisers claim that there is useful information in these advertisements. Discuss both views and give your opinion.", "n": ""}, {"id": 29, "y": 2019, "d": "30/03/2019", "t": "Advantages vs. Disadvantages", "tp": "Crime & Law", "q": "In some countries, some criminal trials in law courts are shown on television so that the general public can watch. Do the advantages outweigh the disadvantages?", "n": ""}, {"id": 30, "y": 2019, "d": "06/04/2019", "t": "Causes & Solutions", "tp": "Environment", "q": "People have little understanding of the importance of the natural world. What are the reasons and how can people learn more about the natural world?", "n": ""}, {"id": 31, "y": 2019, "d": "13/04/2019", "t": "Advantages vs. Disadvantages", "tp": "Food & Agriculture", "q": "In many countries, people like to eat a wider variety of food than can be grown in their local area. As a result, much of the food people eat today has to come from other regions. Do you think the advantages outweigh the disadvantages?", "n": ""}, {"id": 32, "y": 2019, "d": "25/04/2019", "t": "Positive / Negative", "tp": "Society & Culture", "q": "In many countries today, people in cities either live alone or in small family units, rather than in large family groups. Is this a positive or negative trend?", "n": "Lặp lại 13/06/2019"}, {"id": 33, "y": 2019, "d": "27/04/2019", "t": "Agree / Disagree", "tp": "Society & Culture", "q": "Some people think that planning for the future is a waste of time. They believe it is more important to focus on the present. To what extent do you agree or disagree?", "n": ""}, {"id": 34, "y": 2019, "d": "04/05/2019", "t": "Positive / Negative", "tp": "Technology", "q": "Today many children spend a lot of time playing computer games and little time on sports. Why is it? Is it a positive or negative development?", "n": ""}, {"id": 35, "y": 2019, "d": "11/05/2019", "t": "Causes & Solutions", "tp": "Work & Employment", "q": "Some businesses find that their new employees lack basic interpersonal skills such as cooperative skills. What are the causes and what are possible solutions?", "n": ""}, {"id": 36, "y": 2019, "d": "18/05/2019", "t": "Agree / Disagree", "tp": "Media & Advertising", "q": "Advertising is all around us; it is an unavoidable part of everyone's life. Some people say that advertising is a positive part of our lives. To what extent do you agree or disagree?", "n": ""}, {"id": 37, "y": 2019, "d": "23/05/2019", "t": "Advantages vs. Disadvantages", "tp": "Housing & Urban", "q": "In many cities, there is little control on the design and construction of new houses. Some people think that people can choose to build houses in their own styles instead of building them with the same style as the old houses in local areas. Do the advantages outweigh the disadvantages?", "n": ""}, {"id": 38, "y": 2019, "d": "01/06/2019", "t": "Positive / Negative", "tp": "Globalization & Tourism", "q": "Many developing countries are currently expanding their tourist industries. Why is this the case? Is it a positive or negative development?", "n": ""}, {"id": 39, "y": 2019, "d": "22/06/2019", "t": "Causes & Solutions", "tp": "Globalization & Tourism", "q": "Many museums and historical sites are mainly visited by tourists but not local people. Why is this the case? What can be done to attract more local people to visit these places?", "n": ""}, {"id": 40, "y": 2019, "d": "29/06/2019", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "Some people think sending criminals to prison is not an effective way to deal with them. Education and training are better. To what extent do you agree or disagree?", "n": "Lặp lại 07–08/11/2019"}, {"id": 41, "y": 2019, "d": "06/07/2019", "t": "Advantages vs. Disadvantages", "tp": "Food & Agriculture", "q": "Many foods are shipped from far away. Some people think that eating local food is more environmentally and economically beneficial. Do you think the advantages outweigh the disadvantages?", "n": ""}, {"id": 42, "y": 2019, "d": "18/07/2019", "t": "Agree / Disagree", "tp": "Education", "q": "People say that reading for pleasure helps people to develop imagination and better language skills than watching TV. To what extent do you agree or disagree?", "n": ""}, {"id": 43, "y": 2019, "d": "20/07/2019", "t": "Agree / Disagree", "tp": "Media & Advertising", "q": "Nowadays, there is a trend that reports of media focus on problems and emergencies rather than positive development. Some people think this is harmful to individuals and to society. To what extent do you agree or disagree?", "n": ""}, {"id": 44, "y": 2019, "d": "27/07/2019", "t": "Agree / Disagree", "tp": "Education", "q": "Students should be taught academic knowledge so that they can pass exams, and skills such as cooking or dressing should not be taught. To what extent do you agree or disagree?", "n": ""}, {"id": 45, "y": 2019, "d": "01/08/2019", "t": "Causes & Solutions", "tp": "Society & Culture", "q": "The cost of living is higher in many countries. What are the effects on individuals and society? What is the best way for people to deal with this problem?", "n": ""}, {"id": 46, "y": 2019, "d": "10/08/2019", "t": "Discuss Both Views", "tp": "Environment & Animals", "q": "Some people think that zoos are all cruel and should be closed down. Others however believe that zoos can be useful in protecting wild animals. Discuss both opinions and give your own opinion.", "n": ""}, {"id": 47, "y": 2019, "d": "17/08/2019", "t": "Discuss Both Views", "tp": "Society & Culture", "q": "Some people argue that we should do research into our family history. Others agree with the view that we should focus on the present and future generations. Discuss both views and give your own opinion.", "n": ""}, {"id": 48, "y": 2019, "d": "24/08/2019", "t": "Agree / Disagree", "tp": "Housing & Urban", "q": "When a new town is planned, it is more important to develop public parks and sports facilities than shopping centers for people to spend their free time in. To what extent do you agree or disagree?", "n": ""}, {"id": 49, "y": 2019, "d": "07/09/2019", "t": "Causes & Solutions", "tp": "Environment", "q": "The increase in the production of consumer goods results in damage to the natural environment. What are the causes of this? What can be done to solve this problem?", "n": ""}, {"id": 50, "y": 2019, "d": "07/09/2019", "t": "Agree / Disagree", "tp": "Education", "q": "Some people suggest that handwriting skills are not necessary since all writings are being replaced by computer. Do you agree or disagree?", "n": ""}, {"id": 51, "y": 2019, "d": "12/09/2019", "t": "Agree / Disagree", "tp": "Technology", "q": "The availability of entertainment such as video games on handheld devices are harmful to individuals and to the society they live in. To what extent do you agree or disagree?", "n": ""}, {"id": 52, "y": 2019, "d": "14/09/2019", "t": "Discuss Both Views", "tp": "Globalization & Tourism", "q": "Some people think that cultural traditions may be destroyed when they are used as money-making attractions aimed at tourists. Others believe it is the only way to save these traditions. Discuss both views and give your opinion.", "n": "Lặp lại 20/10/2019"}, {"id": 53, "y": 2019, "d": "15/09/2019", "t": "Causes & Solutions", "tp": "Crime & Law", "q": "Currently, crimes committed by young people are on the increase. What are the causes of this? What solutions can parents and teachers adopt?", "n": "Lặp lại 04/10/2019"}, {"id": 54, "y": 2019, "d": "24/09/2019", "t": "Agree / Disagree", "tp": "Work & Employment", "q": "Some people think that money is the most important factor which motivates people to work better. To what extent do you agree or disagree?", "n": ""}, {"id": 55, "y": 2019, "d": "27/09/2019", "t": "Discuss Both Views", "tp": "Education", "q": "Some people think that young children benefit ily & Children", "q": "Today parents spend little free time with their children. Why is it the case? Who are more affected: parents or children?", "n": ""}, {"id": 90, "y": 2020, "d": "21/05/2020", "t": "Discuss Both Views", "tp": "Education", "q": "Some people believe that education is the key to tackling hunger worldwide while others feel that the answer is in food aid. Discuss both views and give your own opinion.", "n": ""}, {"id": 91, "y": 2020, "d": "23/05/2020", "t": "Causes & Solutions", "tp": "Work & Employment", "q": "The world of work is rapidly changing and employees cannot depend on having the same work or the same work conditions for life. Discuss the possible causes and suggest ways to prepare for people to work in the future.", "n": ""}, {"id": 92, "y": 2020, "d": "25/05/2020", "t": "Discuss Both Views", "tp": "Arts & Music", "q": "Some people say that art (e.g. painting, music, poetry) can be made by everyone whereas others believe that it can be only made by those with special abilities. Discuss both views and give your opinion.", "n": ""}, {"id": 93, "y": 2020, "d": "28/05/2020", "t": "Discuss Both Views", "tp": "Sports", "q": "Some people say that sports play an important role in society. Others, however, think that it is nothing more than a leisure activity. Discuss both views and give your own opinion.", "n": ""}, {"id": 94, "y": 2020, "d": "30/05/2020", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "In many countries imprisonment is the most common solution to crimes. However, some people believe that better education will be a more effective solution. To what extent do you agree or disagree?", "n": ""}, {"id": 95, "y": 2020, "d": "04/06/2020", "t": "Agree / Disagree", "tp": "Science & Research", "q": "Research into new types of medicine and treatments are essential for improving health and dealing with diseases. Who do you think should fund these researches: private companies, individuals or governments?", "n": ""}, {"id": 96, "y": 2020, ve that it is too late to solve the problem. Others say we can have effective actions to deal with the situation. Discuss both views and give your opinion.", "n": ""}, {"id": 225, "y": 2022, "d": "30/05/2022", "t": "Advantages vs. Disadvantages", "tp": "Technology", "q": "Widespread of technology has given people more freedom to work instead of travelling to work or college. Do the advantages of this outweigh the disadvantages?", "n": ""}, {"id": 226, "y": 2022, "d": "02/06/2022", "t": "Two-Part Question", "tp": "Health", "q": "Nowadays people have cosmetic surgery to improve life. Why do many more people choose these operations? Is it a positive or negative development?", "n": ""}, {"id": 227, "y": 2022, "d": "04/06/2022", "t": "Two-Part Question", "tp": "Environment", "q": "Environmental damage is a problem in most countries. What factors damage the environment and who should take responsibility?", "n": ""}, {"id": 228, "y": 2022, "d": "05/06/2022", "t": "Discuss Both Views", "tp": "Environment", "q": "Some people believe that children should be taught about recycling and avoiding waste at home, while others believe children should learn this at school. Discuss both views.", "n": ""}, {"id": 229, "y": 2022, "d": "06/06/2022", "t": "Discuss Both Views", "tp": "Environment", "q": "Some people say that economic growth is the only way to end hunger and poverty, while others say that economic growth is damaging the environment so it must be stopped. Discuss both views and give your opinion.", "n": ""}, {"id": 230, "y": 2022, "d": "07/06/2022", "t": "Agree / Disagree", "tp": "Work & Employment", "q": "If people could choose between a life without working or a life spending too much time working, people would choose a life without work. To what extent do you agree or disagree?", "n": ""}, {"id": 231, "y": 2022, "d": "10/06/2022", "t": "Discuss Both Views", "tp": "Media & Advertising", "q": "Some people think watching TV is bad for children, while others think that watching TV has more beneficial effects on children. Discuss both views and give your own opinion.", "n": ""}, {"id": 232, "y": 2022, "d": "11/06/2022", "t": "Discuss Both Views", "tp": "Arts & Music", "q": "Pop stars earn much more than classical music performers.", "n": ""}, {"id": 233, "y": 2022, "d": "13/06/2022", "t": "Agree / Disagree", "tp": "Work & Employment", "q": "The only reason to work hard is to earn money. To what extent do you agree or disagree?", "n": ""}, {"id": 234, "y": 2022, "d": "15/06/2022", "t": "Agree / Disagree", "tp": "Environment", "q": "Some people say that increasing fuel costs could reduce environmental problems. Do you agree or disagree?", "n": ""}, {"id": 235, "y": 2022, "d": "16/06/2022", "t": "Agree / Disagree", "tp": "Environment", "q": "Some people think that one of the most effective ways to deal with environmental problems is to increase the cost of fuel for cars and other vehicles. To what extent do you agree or disagree?", "n": ""}, {"id": 236, "y": 2022, "d": "17/06/2022", "t": "Two-Part Question", "tp": "Work & Employment", "q": "In education and employment, some people work harder than others. Why do some people work harder? Is it always a good thing to work hard?", "n": ""}, {"id": 237, "y": 2022, "d": "18/06/2022", "t": "Causes & Solutions", "tp": "Crime & Law", "q": "Crimes committed by young people are increasing in major cities throughout the world. Discuss the causes and how to solve this problem.", "n": ""}, {"id": 238, "y": 2022, "d": "22/06/2022", "t": "Agree / Disagree", "tp": "Health", "q": "Parents should encourage children to spend less time studying and more time doing physical activities. To what extent do you agree or disagree?", "n": ""}, {"id": 239, "y": 2022, "d": "23/06/2022", "t": "Agree / Disagree", "tp": "Family & Children", "q": "All fathers should be entitled to time off from work when their children are born. What is your opinion?", "n": ""}, {"id": 240, "y": 2022, "d": "24/06/2022", "t": "Agree / Disag his?", "n": ""}, {"id": 247, "y": 2022, "d": "05/07/2022", "t": "Agree / Disagree", "tp": "Education", "q": "Some people think that the main purpose of schools is to turn children into good citizens and workers, rather to benefit them as individuals. To what extent do you agree or disagree?", "n": ""}, {"id": 248, "y": 2022, "d": "06/07/2022", "t": "Agree / Disagree", "tp": "Family & Children", "q": "Some people think that all teenagers should be required to do unpaid work in their free time to help the local community. They believe this would benefit both the individual teenager and society as a whole. Do you agree or disagree?", "n": ""}, {"id": 249, "y": 2022, "d": "07/07/2022", "t": "Positive / Negative", "tp": "Technology", "q": "Nowadays people depend on technology for leisure activities. Is this a positive or negative development?", "n": ""}, {"id": 250, "y": 2022, "d": "09/07/2022", "t": "Agree / Disagree", "tp": "Sports", "q": "Companies use major sporting events to promote their products. Some people think it has a negative effect on sport in general. To what extent do you agree or disagree?", "n": ""}, {"id": 251, "y": 2022, "d": "16/07/2022", "t": "Two-Part Question", "tp": "Society & Culture", "q": "In some parts of the world it is increasingly popular to research the history of one's own family. Why do people want to do this? Is it a positive or negative development?", "n": ""}, {"id": 252, "y": 2022, "d": "23/07/2022", "t": "Problems & Solutions", "tp": "Work & Employment", "q": "Nowadays, most people try to balance between work and other parts of their lives. Unfortunately, not many achieve this balance. What are the problems with this? Suggest some solutions.", "n": ""}, {"id": 253, "y": 2022, "d": "24/07/2022", "t": "Positive / Negative", "tp": "Technology", "q": "In the modern world, it is possible to shop, work and communicate with people via internet and live without any face-to-face contact with others. Is it a positive or negative development? tion", "tp": "Technology", "q": "Mobile phone and the internet could have many benefits for old people. However, this age group uses technology the least. What are the benefits for old people of using mobile phones and the internet? How can we encourage them to use this new technology?", "n": ""}, {"id": 539, "y": 2025, "d": "20/01/2025", "t": "Agree / Disagree", "tp": "Food & Agriculture", "q": "Some people suggest that a country should try to produce all the food for its population and import as little food as possible. To what extent do you agree or disagree?", "n": ""}, {"id": 540, "y": 2025, "d": "05/02/2025", "t": "Agree / Disagree", "tp": "Education", "q": "University students always focus on one specialist subject, but some people think universities should encourage their students to study a range of subjects in addition to their own subject. To what extent do you agree or disagree?", "n": "Lặp lại 04/05 & 15/12/2025"}, {"id": 541, "y": 2025, "d": "09/02/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "Technological advancements are expected to provide people in the 21st century with significantly more free time. How accurate has this prediction been so far? Explain your viewpoint with reasons and include appropriate examples based on your knowledge or experiences.", "n": "Lặp lại 25/10/2025"}, {"id": 542, "y": 2025, "d": "13/02/2025", "t": "Agree / Disagree", "tp": "Health", "q": "Some people think that shops should not be allowed to sell any food or drink that has scientifically been proved to have bad effects on people's health. To what extent do you agree or disagree?", "n": ""}, {"id": 543, "y": 2025, "d": "13/02/2025", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "Studies show that many criminals have a low level of education. For this reason, people believe that the best way to reduce crime is to educate people in prison so they can know when they leave prison. Do you agree or disagree?", "n": "Lặp lại 25/07/2025"}, {"id": 544, "y": 2025, "d": "17/02/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Some people say that the main purpose of school is to turn children into good citizens and workers, rather than to benefit them as individuals. To what extent do you agree or disagree?", "n": "Lặp lại 19/04 & 30/08/2025"}, {"id": 545, "y": 2025, "d": "22/02/2025", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people think that the best way to reduce crime is to give longer prison sentences. Others, however, believe there are better alternative ways of reducing crime. Discuss both views and give your opinion.", "n": ""}, {"id": 546, "y": 2025, "d": "23/02/2025", "t": "Agree / Disagree", "tp": "Education", "q": "University education should be free for all students. To what extent do you agree or disagree?", "n": "Lặp lại 31/08 & 11/12/2025"}, {"id": 547, "y": 2025, "d": "24/02/2025", "t": "Discuss Both Views", "tp": "Environment", "q": "Research has shown that the transportation of products and people are the main source of pollution. Some people believe government should be in charge of this, while others believe it is the fault of individuals. Discuss both views and give your opinion.", "n": ""}, {"id": 548, "y": 2025, "d": "25/02/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Some students choose to work or travel after leaving school and before going to university. Many people, however, say that working experience is more useful in adult life than travel. To what extent do you agree or disagree?", "n": ""}, {"id": 549, "y": 2025, "d": "25/02/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Some people think that schools should stop teaching students by using books, because students find them boring, and that children can learn from films, TV, video games and computers instead. To what extent do you agree or disagree?", "n": ""}, {"id": 550, "y": 2025, "d": "28/02/2025", "t": "Causes & Effects", "tp": "Society & Culture", "q": "Nowadays, people always throw the old things away when they buy new things; whereas in the past, old things were repaired and used again. What factors cause this phenomenon? What effects the phenomenon leads to?", "n": ""}, {"id": 551, "y": 2025, "d": "01/03/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "In the modern world, schools are no longer necessary because there is so much information available through the internet that children can study just as well at home. To what extent do you agree or disagree?", "n": "Lặp lại 24/03 & 18/04/2025"}, {"id": 552, "y": 2025, "d": "01/03/2025", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people think technology development decrease crime while others believe it actually encourages crime discuss both views and give your own opinion.", "n": ""}, {"id": 553, "y": 2025, "d": "02/03/2025", "t": "Positive / Negative", "tp": "Education", "q": "More and more universities are replacing face-to-face teaching with online courses. Do you think this is a positive or negative development?", "n": "Lặp lại 20/10/2025"}, {"id": 554, "y": 2025, "d": "06/03/2025", "t": "Discuss Both Views", "tp": "Science & Research", "q": "Some think scientists should be allowed to send messages into space to communicate with other life forms while others believe this is too dangerous. Discuss both sides and give your own opinion.", "n": ""}, {"id": 555, "y": 2025, "d": "08/03/2025", "t": "Agree / Disagree", "tp": "Environment", "q": "Governments should make people responsible for looking after their own local environment. Do you agree or disagree?", "n": "Lặp lại 22/02/2025"}, {"id": 556, "y": 2025, "d": "08/03/2025", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people think all lawbreakers should be put into prison, while others believe that there are better alternatives. Discuss both views and give your own opinion.", "n": ""}, {"id": 557, "y": 2025, "d": "11/03/2025", "t": "Agree / Disagree", "tp": "Education", "q": "It is neither possible nor useful for a country to provide university places for a high proportion of young people. To what extent do you agree or disagree?", "n": "Lặp lại 15/06/2025"}, {"id": 558, "y": 2025, "d": "15/03/2025", "t": "Advantages vs. Disadvantages", "tp": "Society & Culture", "q": "Many young people are leaving their homes in rural areas to study or work in the cities. Do the advantages of this development outweigh its disadvantages?", "n": ""}, {"id": 559, "y": 2025, "d": "17/03/2025", "t": "Advantages vs. Disadvantages", "tp": "Family & Children", "q": "In some countries today, many people are choosing to have their first child later in life. What are the reasons for this trend? Do the advantages of this outweigh the disadvantages?", "n": ""}, {"id": 560, "y": 2025, "d": "22/03/2025", "t": "Two-Part Question", "tp": "Technology", "q": "Nowadays, many people use the Internet to get medical advice instead of going to see a doctor. Why is this? Do you think it is a positive or negative development?", "n": ""}, {"id": 561, "y": 2025, "d": "23/03/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "There have been many inventions in human history, such as the wheel. Some people think the most important thing is the Internet. To what extent do you agree or disagree?", "n": "Lặp lại 23/07 & 28/09/2025"}, {"id": 562, "y": 2025, "d": "29/03/2025", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "Some people believe that young people who commit serious crimes should be punished in the same way as adults. To what extent do you agree or disagree?", "n": "Lặp lại 13/08, 19/08, 11/07/2025"}, {"id": 563, "y": 2025, "d": "30/03/2025", "t": "Agree / Disagree", "tp": "Family & Children", "q": "The best way to ensure the growth of children is to make parents take parenting courses. Do you agree or disagree?", "n": "Lặp lại 05/02/2025"}, {"id": 564, "y": 2025, "d": "03/04/2025", "t": "Two-Part Question", "tp": "Work & Employment", "q": "Some countries have introduced a law to limit working hours for employees. Why is this law introduced? Do you think it is a positive or a negative development?", "n": ""}, {"id": 565, "y": 2025, "d": "09/04/2025", "t": "Agree / Disagree", "tp": "Housing & Urban", "q": "Some believe that because everyone needs a place to live, governments should provide houses for those who are too poor to afford their own. To what extent do you agree or disagree?", "n": "Lặp lại 03/09 & 18/04/2025"}, {"id": 566, "y": 2025, "d": "11/04/2025", "t": "Agree / Disagree", "tp": "Work & Employment", "q": "Some people think that people who choose a job early and keep doing it are more likely to get a satisfying career life than those who frequently change jobs. To what extent do you agree or disagree?", "n": ""}, {"id": 567, "y": 2025, "d": "12/04/2025", "t": "Advantages vs. Disadvantages", "tp": "Education", "q": "In some countries, young people are encouraged to work or travel for a year between finishing high school and starting university studies. Discuss the advantages and disadvantages for young people who decide to do this.", "n": ""}, {"id": 568, "y": 2025, "d": "17/04/2025", "t": "Discuss Both Views", "tp": "Education", "q": "Some people believe that students in school learn better when they studying in group whereas others believe students learn better when they study their own. Discuss both views and give opinion.", "n": ""}, {"id": 569, "y": 2025, "d": "25/04/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "Some people claim that public museums and art galleries will not be needed because people can see historical objects and works of art by using a computer. Do you agree or disagree with this opinion?", "n": "Lặp lại 06/05 & 05/11/2025"}, {"id": 570, "y": 2025, "d": "29/04/2025", "t": "Agree / Disagree", "tp": "Crime & Law", "q": "In many countries imprisonment is the most common solution to crimes. However, some people believe that better education will be a more effective solution. To what extent do you agree or disagree? rnments should make sure that their citizens have a healthy diet. Discuss both views and give your opinion.", "n": "Lặp lại 18/02/2025"}, {"id": 578, "y": 2025, "d": "16/05/2025", "t": "Agree / Disagree", "tp": "Environment", "q": "Solving environmental problems should be the responsibility of an international organization rather than each national government. Do you agree or disagree?", "n": "Lặp lại 26/07, 25/10, 28/02/2025"}, {"id": 579, "y": 2025, "d": "17/05/2025", "t": "Agree / Disagree", "tp": "Society & Culture", "q": "People's shopping habits depend more on the age group they belong to than other factors. To what extent do you agree or disagree?", "n": ""}, {"id": 580, "y": 2025, "d": "20/05/2025", "t": "Agree / Disagree", "tp": "Housing & Urban", "q": "There are severe social consequences to housing shortages in cities, and only the government can solve these problems. To what extent do you agree or disagree?", "n": "Lặp lại 23/07 & 14/09/2025"}, {"id": 581, "y": 2025, "d": "01/06/2025", "t": "Discuss Both Views", "tp": "Education", "q": "Some people think that schools should choose students according to their academic abilities, while others think it is better to have students of different abilities studying together. Discuss both views and state your own opinion.", "n": "Lặp lại 14/12/2025"}, {"id": 582, "y": 2025, "d": "05/06/2025", "t": "Discuss Both Views", "tp": "Technology", "q": "Some think that printed books are not necessary in the digital era, because all writing can be stored electronically. Others think printed books still play an important role. Discuss both views and give your opinion.", "n": ""}, {"id": 583, "y": 2025, "d": "07/06/2025", "t": "Agree / Disagree", "tp": "Environment", "q": "Environmental protection should be the responsibility of politicians, not individuals as individuals can do too little. To what extent do you agree or disagree?", "n": ""}, {"id": 584, "y": 2025, "d": "08/06/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Schools should not force children to learn a foreign language, because some students don't have a natural ability for languages. Do you agree or disagree with this statement?", "n": "Lặp lại 16/01/2025"}, {"id": 585, "y": 2025, "d": "11/06/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "With the rapid advancement of communication technology: smartphones, tablets and other mobile devices, some people believe that the disadvantages outweigh the advantages. To what extent do you agree or disagree?", "n": "Lặp lại 21/07 & 13/12/2025"}, {"id": 586, "y": 2025, "d": "12/06/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Some people think the government should invest more money in teaching science than other subjects in order for a country to develop and progress. To what extent do you agree or disagree?", "n": "Lặp lại 23/06/2025"}, {"id": 587, "y": 2025, "d": "15/06/2025", "t": "Causes & Solutions", "tp": "Society & Culture", "q": "In some countries, it is difficult for family members and friends to spend enough time with elderly people to look after them. What do you think the cause of the problem? What can we do for the problem?", "n": ""}, {"id": 588, "y": 2025, "d": "21/06/2025", "t": "Agree / Disagree", "tp": "Environment", "q": "Individuals can do nothing to improve the environment; only governments and large companies can make a difference. To what extent do you agree or disagree?", "n": ""}, {"id": 589, "y": 2025, "d": "04/07/2025", "t": "Agree / Disagree", "tp": "Housing & Urban", "q": "Traffic and housing problems could be solved by moving large companies, factories and their employees to the countryside. Do you agree or disagree?", "n": "Lặp lại 15/06/2025"}, {"id": 590, "y": 2025, "d": "05/07/2025", "t": "Agree / Disagree", "tp": "Health", "q": "It is more important to spend public money on promoting a healthy lifestyle in order to prevent illness than to spend it on the treatment of people who are already ill. To what extent do you en", "q": "These days more fathers stay at home and take care of their children while mothers go out to work. What could be the reasons for this? Do you think it is a positive or a negative development?", "n": ""}, {"id": 605, "y": 2025, "d": "05/09/2025", "t": "Discuss Both Views", "tp": "Health", "q": "Some people think the government should subsidise fruits and vegetables to make healthy food more affordable. Others argue that the government should tax unhealthy food instead. Discuss both views and give your opinion.", "n": "Lặp lại 23/11 & 28/01/2025"}, {"id": 606, "y": 2025, "d": "07/09/2025", "t": "Two-Part Question", "tp": "Society & Culture", "q": "In the past, people lived in one place for a long time, but now they can live in many different places. What are the reasons? Is this a positive or negative development?", "n": "Lặp lại 17/10/2025"}, {"id": 607, "y": 2025, "d": "13/09/2025", "t": "Two-Part Question", "tp": "Society & Culture", "q": "Nowadays, many people are choosing to live alone. Why is this the case? Is this a positive or negative development for society?", "n": ""}, {"id": 608, "y": 2025, "d": "21/09/2025", "t": "Agree / Disagree", "tp": "Family & Children", "q": "If the older people are not physically, mentally, or financially able to look after themselves, the younger family members have legal responsibilities to take care of them. Do you agree or disagree?", "n": "Lặp lại 20/04/2025"}, {"id": 609, "y": 2025, "d": "04/10/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Some people believe that governments should pay full course fees for students who want to study in universities. Do you agree or disagree with this statement?", "n": ""}, {"id": 610, "y": 2025, "d": "10/10/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "The typical teaching situation of a teacher and students in the class will not exist by the year 2050. To what extent do you agree or disagree?", "n": ""}, {"id": 611, "y": 2025, "d": "18/10/2025", "t": "Two-Part Question", "tp": "Food & Agriculture", "q": "In many countries, more and more people choose to buy imported food rather than food produced locally. Why do people buy imported food? What could be done to encourage people to buy local food?", "n": ""}, {"id": 612, "y": 2025, "d": "18/10/2025", "t": "Advantages vs. Disadvantages", "tp": "Technology", "q": "The personal information of many individuals is held by large internet companies and organizations. Do you think the advantages of this outweigh the disadvantages?", "n": "Lặp lại 01/06/2025"}, {"id": 613, "y": 2025, "d": "28/10/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "Many people think that mobile phones should be banned in public place such as libraries, shops and public transport. Do you agree or disagree.", "n": ""}, {"id": 614, "y": 2025, "d": "02/11/2025", "t": "Agree / Disagree", "tp": "Technology", "q": "Some people think the money spent on developing the technology for space exploration is not justified. There are more beneficial ways to spend this money. To what extent do you agree or disagree?", "n": ""}, {"id": 615, "y": 2025, "d": "06/11/2025", "t": "Discuss Both Views", "tp": "Globalization & Tourism", "q": "In many countries, the majority of shops and products are now similar. Some people believe this is a positive development, while others think it is negative. Discuss both views and give your own opinion.", "n": "Lặp lại 21/06/2025"}, {"id": 616, "y": 2025, "d": "17/11/2025", "t": "Agree / Disagree", "tp": "Transport", "q": "The only way to improve road safety is to give much stricter punishments on driving offenses. To what extent do you agree or disagree?", "n": ""}, {"id": 617, "y": 2025, "d": "20/11/2025", "t": "Advantages vs. Disadvantages", "tp": "Society & Culture", "q": "In the past, people usually stayed in one place throughout their life. These days, people often move around. They often live in several different places in their lifetime. What are the advantages and disadvantages of both?", "n": ""}, {"id": 618, "y": 2025, "d": "22/11/2025", "t": "Agree / Disagree", "tp": "Health", "q": "In many countries, children are becoming overweight and unhealthy. Some people think that the government should have the responsibility. To what extent do you agree or disagree?", "n": "Lặp lại 28/03/2025"}, {"id": 619, "y": 2025, "d": "30/11/2025", "t": "Discuss Both Views", "tp": "Education", "q": "Some people believe that studying in a university or college prepare for a successful career, while others think that getting a job develop career through working experience. Discuss both views.", "n": ""}, {"id": 620, "y": 2025, "d": "04/12/2025", "t": "Agree / Disagree", "tp": "Education", "q": "Everyone should stay at school until 18. To what extent do you agree or disagree?", "n": ""}, {"id": 621, "y": 2025, "d": "08/12/2025", "t": "Two-Part Question", "tp": "Work & Employment", "q": "Many young people regularly change their job over the years. What are the reasons for this? Do the advantages outweigh the disadvantages?", "n": ""}, {"id": 622, "y": 2025, "d": "13/12/2025", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people think it is better for one single legal system throughout the world. Others say countries should have their own law. Discuss both view and give your opinion.", "n": "Lặp lại 04/07/2025"}, {"id": 623, "y": 2025, "d": "18/12/2025", "t": "Discuss Both Views", "tp": "Crime & Law", "q": "Some people believe that a crime is a result of social problems and poverty, others think that crime is a result of bad person's nature. Discuss both views and give your opinion.", "n": ""}];

const TYPE_MAP = {
  'Agree / Disagree': {abbr:'A/D', cls:'ad'},
  'Discuss Both Views': {abbr:'DBV', cls:'dbv'},
  'Advantages vs. Disadvantages': {abbr:'Adv/Dis', cls:'advdis'},
  'Positive / Negative': {abbr:'P/N', cls:'pn'},
  'Causes & Solutions': {abbr:'C/S', cls:'cs'},
  'Causes & Effects': {abbr:'C/E', cls:'ce'},
  'Problems & Solutions': {abbr:'P/S', cls:'ps'},
  'Two-Part Question': {abbr:'2Q', cls:'tq'},
};

const PER_PAGE = 30;
let page = 1;
let filters = { years: new Set(), types: new Set(), topics: new Set(), search: '' };
let filtered = [...DATA];

// ── INIT CHIPS ──
function initChips() {
  const years = [...new Set(DATA.map(d=>d.y))].sort();
  const types = [...new Set(DATA.map(d=>d.t))].sort((a,b)=>{
    const order = ['Agree / Disagree','Discuss Both Views','Advantages vs. Disadvantages','Positive / Negative','Causes & Solutions','Causes & Effects','Problems & Solutions','Two-Part Question'];
    return order.indexOf(a)-order.indexOf(b);
  });
  const topics = [...new Set(DATA.map(d=>d.tp))].sort();

  const yCont = document.getElementById('yearChips');
  years.forEach(y => {
    const c = mkChip(String(y), 'year', String(y));
    yCont.appendChild(c);
  });

  const tCont = document.getElementById('typeChips');
  types.forEach(t => {
    const info = TYPE_MAP[t]||{abbr:t,cls:''};
    const c = mkChip(info.abbr, 'type', t);
    c.classList.add('chip-'+info.cls);
    tCont.appendChild(c);
  });

  const tpCont = document.getElementById('topicChips');
  topics.forEach(tp => {
    const c = mkChip(tp, 'topic', tp);
    tpCont.appendChild(c);
  });
}

function mkChip(label, group, value) {
  const el = document.createElement('span');
  el.className = 'chip';
  el.textContent = label;
  el.dataset.group = group;
  el.dataset.value = value;
  el.onclick = () => toggleChip(el, group, value);
  return el;
}

function toggleChip(el, group, value) {
  const set = group==='year'? filters.years : group==='type'? filters.types : filters.topics;
  if (set.has(value)) { set.delete(value); el.classList.remove('active'); }
  else { set.add(value); el.classList.add('active'); }
  page = 1;
  applyFilters();
}

// ── SEARCH ──
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    filters.search = e.target.value.trim().toLowerCase();
    page = 1;
    applyFilters();
  }, 200);
});

// ── FILTER ──
function applyFilters() {
  filtered = DATA.filter(d => {
    if (filters.years.size && !filters.years.has(String(d.y))) return false;
    if (filters.types.size && !filters.types.has(d.t)) return false;
    if (filters.topics.size && !filters.topics.has(d.tp)) return false;
    if (filters.search && !d.q.toLowerCase().includes(filters.search)) return false;
    return true;
  });
  render();
}

function clearAll() {
  filters = { years: new Set(), types: new Set(), topics: new Set(), search: '' };
  document.querySelectorAll('.chip.active').forEach(c=>c.classList.remove('active'));
  document.getElementById('searchInput').value = '';
  page = 1;
  applyFilters();
}

// ── RENDER ──
function render() {
  renderCount();
  renderCards();
  renderPagination();
  renderYearBars();
}

function renderCount() {
  document.getElementById('countDisplay').textContent = filtered.length;
  const info = document.getElementById('filterInfo');
  const parts = [];
  if (filters.years.size) parts.push([...filters.years].join(', '));
  if (filters.types.size) parts.push([...filters.types].map(t=>(TYPE_MAP[t]||{}).abbr||t).join(', '));
  if (filters.topics.size) parts.push([...filters.topics].join(', '));
  if (filters.search) parts.push('"'+filters.search+'"');
  if (parts.length) {
    info.style.display = 'block';
    document.getElementById('filterText').textContent = 'Lọc: ' + parts.join(' · ');
  } else {
    info.style.display = 'none';
  }
}

function highlight(text, query) {
  if (!query) return esc(text);
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('('+escaped+')', 'gi');
  return esc(text).replace(re, '<mark>$1</mark>');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderCards() {
  const list = document.getElementById('cardList');
  const start = (page-1)*PER_PAGE;
  const slice = filtered.slice(start, start+PER_PAGE);

  if (!slice.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">∅</div>Không tìm thấy đề nào phù hợp.<br>Thử thay đổi bộ lọc hoặc từ khóa.</div>';
    return;
  }

  list.innerHTML = slice.map(d => {
    const info = TYPE_MAP[d.t]||{abbr:d.t,cls:''};
    const q = highlight(d.q, filters.search);
    const note = d.n ? '<div class="card-note">'+esc(d.n)+'</div>' : '';
    return '<div class="card card-border-'+info.cls+'">'+
      '<div class="card-top">'+
        '<span class="card-id">#'+d.id+'</span>'+
        '<span class="badge badge-'+info.cls+'">'+info.abbr+'</span>'+
        '<span class="card-date">'+esc(d.d)+'</span>'+
        '<span class="card-topic">'+esc(d.tp)+'</span>'+
      '</div>'+
      '<div class="card-q">'+q+'</div>'+
      note+
    '</div>';
  }).join('');
}

function renderPagination() {
  const cont = document.getElementById('pagination');
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { cont.innerHTML = ''; return; }

  let html = '<button class="page-btn" onclick="goPage('+(page-1)+')" '+(page===1?'disabled':'')+'>← Trước</button>';
  
  const pages = [];
  if (total <= 7) {
    for (let i=1;i<=total;i++) pages.push(i);
  } else {
    pages.push(1);
    if (page > 3) pages.push('...');
    for (let i=Math.max(2,page-1);i<=Math.min(total-1,page+1);i++) pages.push(i);
    if (page < total-2) pages.push('...');
    pages.push(total);
  }
  
  pages.forEach(p => {
    if (p==='...') html += '<span class="page-info">…</span>';
    else html += '<button class="page-btn'+(p===page?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  });
  
  html += '<button class="page-btn" onclick="goPage('+(page+1)+')" '+(page===total?'disabled':'')+'>Sau →</button>';
  html += '<span class="page-info">'+((page-1)*PER_PAGE+1)+'–'+Math.min(page*PER_PAGE,filtered.length)+' / '+filtered.length+'</span>';
  cont.innerHTML = html;
}

function goPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  page = p;
  renderCards();
  renderPagination();
  document.querySelector('.main').scrollIntoView({behavior:'smooth',block:'start'});
}

// ── YEAR BARS ──
function renderYearBars() {
  const years = [2019,2020,2021,2022,2023,2024,2025];
  const counts = {};
  years.forEach(y => counts[y] = filtered.filter(d=>d.y===y).length);
  const max = Math.max(...Object.values(counts), 1);
  
  const colors = ['#60a5fa','#818cf8','#a78bfa','#c084fc','#e879f9','#f472b6','#fb7185'];
  
  document.getElementById('yearBars').innerHTML = years.map((y,i) => {
    const pct = (counts[y]/max*100).toFixed(0);
    return '<div class="bar-row">'+
      '<span class="bar-label">'+y+'</span>'+
      '<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+colors[i]+'"></div></div>'+
      '<span class="bar-count">'+counts[y]+'</span>'+
    '</div>';
  }).join('');
}

// ── KEYBOARD ──
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    document.getElementById('searchInput').blur();
  }
});

// ── BOOT ──
initChips();
applyFilters();
</script>
</body>
</html>
